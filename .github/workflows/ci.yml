name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run unit tests
        run: |
          go test \
            ./app/internal/users/domain/... \
            ./app/internal/users/service/... \
            ./app/pkg/... \
            -v -count=1

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run E2E tests
        run: go test -tags=e2e ./app/tests/e2e/... -v -count=1 -timeout 120s
